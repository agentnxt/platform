server {
    listen 3500;

    proxy_set_header Accept-Encoding "";

    location = /analytics-init.js {
        alias /etc/nginx/static/analytics-init.js;
        add_header Content-Type "application/javascript";
        add_header Cache-Control "public, max-age=3600";
    }

    location = /custom/override.css {
        alias /etc/nginx/static/override.css;
        add_header Content-Type "text/css";
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://agentstudio:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        sub_filter '</head>' '<link rel="stylesheet" href="/custom/override.css"><script src="/analytics-init.js" defer></script></head>';
        sub_filter '>sim<' '>AgentStudio<';
        sub_filter_once off;
        sub_filter_types text/html;
    }
}
