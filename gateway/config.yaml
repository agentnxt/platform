# ── LLM Gateway — LiteLLM Proxy Config ───────────────────────────────────────
#
# Model routing strategy:
#   Cloud keys present  →  cloud model is used
#   Cloud keys missing  →  falls back to local Ollama model
#
# The actual model used is always returned in the API response `model` field
# and logged to Langfuse — so the user always sees which model served the request.
#
# Fallback chain:
#   gpt-4o              →  qwen2.5:7b  (local)
#   claude-3-5-sonnet   →  qwen2.5:7b  (local)
#   gemini-pro          →  qwen2.5:7b  (local)
#   gpt-4o-mini         →  phi3.5      (local, fast/cheap)
#   text-embedding-*    →  nomic-embed-text (local)
# ─────────────────────────────────────────────────────────────────────────────

model_list:
  # ── Cloud models ────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-3-haiku
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # ── Local models (Ollama) ────────────────────────────────────────────────
  - model_name: qwen2.5:7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://localllm:11434

  - model_name: phi3.5
    litellm_params:
      model: ollama/phi3.5:latest
      api_base: http://localllm:11434

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://localllm:11434

litellm_settings:
  success_callback:
    - langfuse
    - lago
  failure_callback:
    - langfuse
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY
  langfuse_host: http://observellm:3000

  # ── Model fallbacks — cloud → local ─────────────────────────────────────
  # When a cloud model fails (missing key, quota, outage), LiteLLM
  # automatically retries with the local fallback and logs the swap to Langfuse.
  fallbacks:
    - gpt-4o:           ["qwen2.5:7b"]
    - gpt-4o-mini:      ["phi3.5"]
    - claude-3-5-sonnet: ["qwen2.5:7b"]
    - claude-3-haiku:   ["phi3.5"]
    - gemini-pro:       ["qwen2.5:7b"]

  context_window_fallbacks:
    - gpt-4o:           ["qwen2.5:7b"]
    - claude-3-5-sonnet: ["qwen2.5:7b"]

  # Return actual model used in every response (transparency)
  add_function_to_prompt: false
  drop_params: true   # silently drop unsupported params per model

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
