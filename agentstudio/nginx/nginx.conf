server {
    listen 3500;

    # Allow sub_filter to work on compressed responses
    proxy_set_header Accept-Encoding "";

    # Shared dark theme
    location = /theme.css {
        alias /etc/nginx/static/theme.css;
        add_header Content-Type "text/css";
        add_header Cache-Control "public, max-age=3600";
    }

    # Analytics init script
    location = /analytics-init.js {
        alias /etc/nginx/static/analytics-init.js;
        add_header Content-Type "application/javascript";
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://agentstudio:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject shared theme + AgentStudio-specific split-layout CSS + analytics
        sub_filter '</head>' '<link rel="stylesheet" href="/theme.css"><script src="/analytics-init.js" defer></script><style>
/* ── AgentStudio — Split-screen login layout ─────────────── */

/* Left branding panel */
body::before {
  content: "";
  position: fixed;
  inset: 0 50% 0 0;
  background:
    radial-gradient(ellipse at 30% 40%, rgba(51,196,130,0.15) 0%, transparent 60%),
    linear-gradient(160deg, #0b1a10 0%, #0b0b0b 100%);
  z-index: 0;
  pointer-events: none;
}

/* Left panel tagline */
body::after {
  content: "Build smarter\Aagents.";
  white-space: pre;
  position: fixed;
  inset: 0 50% 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 3rem;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 2.75rem;
  font-weight: 800;
  line-height: 1.2;
  color: #f6f6f0;
  letter-spacing: -0.03em;
  text-shadow: 0 0 60px rgba(51,196,130,0.25);
  z-index: 1;
  pointer-events: none;
}

/* Push sign-in card to right half */
@media (min-width: 768px) {
  body > div > div:first-child {
    padding-left: 50% !important;
  }
  .flex.min-h-screen.flex-col.items-center.justify-center,
  .flex.min-h-screen.items-center.justify-center,
  [class*="flex"][class*="items-center"][class*="justify-center"][class*="min-h"] {
    padding-left: 50% !important;
    background: transparent !important;
    position: relative;
    z-index: 2;
  }
}
</style></head>';

        sub_filter_once on;
        sub_filter_types text/html;
    }
}
