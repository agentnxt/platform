server {
    listen 8502;

    # Allow sub_filter to work on compressed responses
    proxy_set_header Accept-Encoding "";

    # Shared dark theme
    location = /theme.css {
        alias /etc/nginx/static/theme.css;
        add_header Content-Type "text/css";
        add_header Cache-Control "public, max-age=3600";
    }

    # Analytics init script
    location = /analytics-init.js {
        alias /etc/nginx/static/analytics-init.js;
        add_header Content-Type "application/javascript";
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://agentcrew:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Streamlit uses WS)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;

        # Inject theme + analytics into every HTML page
        sub_filter '</head>' '<link rel="stylesheet" href="/theme.css"><script src="/analytics-init.js" defer></script></head>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
